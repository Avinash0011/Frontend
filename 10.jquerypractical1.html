<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/src/output.css">
    <script src="/jquery-3.7.1.min.js"></script>

    <script>
        $(document).ready(function(){
            alert("ok");
        });
    </script>
</head>
<body>
    <div class="w-32 h-32 bg-purple-300 divclass" id="div1">This is a div section</div>
    <script>
        $(document).ready(function(){
            // selector
            var a = $('div1').html();
            console.log(a);
        })
    </script>

    <ul class="list-disc m-10 divclass">
        <li>Item1</li>
        <li>Item2</li>
        <li>Item3</li>
        <li>Item4</li>
        <li>Item5</li>
        <li>Item6</li>
    </ul>
    <div class="w-32 h-32 bg-blue-300 "id="div2"></div>


    <form action="">
        <input type="text" class="border-2" id="input1">
        <input type="password" name="" id="input2">
    </form>


    <select name="" id="" class="border-2" id="select1">
        <option value="" id="option1">Kerala</option>
        <option value="">Punjab</option>
        <option value="">Delhi</option>
    </select>

    <!-- Hide and Show method -->


    <script>
        $(document).ready(function(){
            var a = $('div1').html();
            $('#div2').html(a);
            $('ul li:gt(3)').css({"color":"blue","border":"2px solid red"});
            
        })

        // $('#div1').dblclick(function(){
        //     $('div1').css("background-color","yellow");
        // })
        $('#div1').dblclick(function(){
            $(this).css("background-color","brown");
        })
        // $('#div1').contextmenu(function(){
        //     $(this).css("background-color","brown");
        // })
        $('#input1').keydown(function(){
            alert("key Pressed");
        })
        $('#input1').keyup(function(){
            $(this).css("background-color","pink")
        })
        $('#input1').focus(function(){
            $(this).css("background-color","brown")
        })
        $('#input2').select(function(){
            $(this).css("background-color","brown")
        })
        $('#select1').change(function(){
            $(this).css({"background-color":"green", "color":"white"})
            var b = $(this).val();
            $('#div3').html(b);
        })
    </script>
    
</body>
</html>
