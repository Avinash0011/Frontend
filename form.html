<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <link rel="stylesheet" href="/src/output.css">
</head>
<body>
    <!-- <h1 class="font-medium text-center text-3xl mt-5">Tailwind CSS Form Example</h1> -->
    <div class="bg-gray-100 w-120 h-160 mx-auto mt-5 border-2 rounded-xl p-10">
        <h1 class="font-medium text-center text-3xl mt-5">Tailwind CSS Form Example</h1>
        <label for="fname" class="font-medium">Name</label>
        <input type="text" id="fname" name="fname" placeholder="Enter Your Name" class="border block w-100 h-8 rounded-xl p-5 mt-3 mb-2 focus:border-blue-900 focus:outline-none">
        <label for="email" class="font-medium">Email</label>
        <input type="text" id="email" name="email" placeholder="Enter Your Email" class="border block w-100 h-8 rounded-xl p-5 mt-3 mb-2 focus:border-blue-900 focus:outline-none">
        <label for="password" class="font-medium">Password</label>
        <input type="text" id="password" name="password" placeholder="Enter Your Password" class="border block w-100 h-8 rounded-xl p-5 mt-3 mb-2 focus:border-blue-900 focus:outline-none">
        <label for="message" class="font-medium">Message</label>
        <textarea name="message" id="message" placeholder="Enter Your Message" class="border block w-100 h-30 mt-3 rounded-xl p-3 focus:border-blue-900 focus:outline-none"></textarea>

        <input type="checkbox" class="mt-7 mr-2">I agree to <span class="text-blue-800">terms & conditions</span>
        <button class="block border-1 w-100 h-10 mt-5 rounded-xl bg-blue-700 text-white">Submit</button>
    </div>
</body>
</html>
