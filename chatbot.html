<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Goal Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-100 to-indigo-100 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-lg bg-white shadow-xl rounded-2xl overflow-hidden flex flex-col">
    <!-- Header -->
    <div class="bg-gradient-to-r from-indigo-500 to-purple-500 text-white text-xl font-semibold text-center py-4">
      💬 Financial Goal Assistant
    </div>

    <!-- Chat Box -->
    <div id="chatBox" class="flex-1 overflow-y-auto px-4 py-3 space-y-4 h-[60vh] scroll-smooth">
      <!-- Messages will appear here -->
    </div>

    <!-- Controls -->
    <div class="border-t bg-gray-50">
      <!-- Dropdown -->
      <div class="px-4 py-2">
        <select id="goalSelect" class="w-full px-3 py-2 rounded-lg border border-gray-300 text-gray-700">
          <option value="">🎯 Select a financial goal...</option>
          <option value="I want to save $2000 for a vacation by December.">Vacation</option>
          <option value="I want to save $8000 for a new car within 12 months.">Buy a Car</option>
          <option value="I want to build an emergency fund of $5000 in 10 months.">Emergency Fund</option>
          <option value="I want to pay off $3000 in credit card debt by next year.">Pay Off Debt</option>
          <option value="custom">➕ Custom goal (type below)</option>
        </select>
      </div>

      <!-- Input + Button -->
      <div class="flex border-t px-4 py-2">
        <input id="userInput" type="text" placeholder="Or type your own goal..." class="flex-1 px-3 py-2 rounded-l-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        <button onclick="sendMessage()" class="bg-indigo-500 text-white px-4 py-2 rounded-r-lg hover:bg-indigo-600 transition">
          Send
        </button>
      </div>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById('chatBox');
    const API_KEY = 'AIzaSyD57-d2ARNdNNncocKqijD88qWblI2IDy8';

    function appendMessage(sender, text) {
      const msg = document.createElement('div');
      msg.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
      msg.innerHTML = `
        <div class="max-w-[75%] px-4 py-2 rounded-lg shadow text-sm ${sender === 'user'
          ? 'bg-indigo-500 text-white rounded-br-none'
          : 'bg-gray-100 text-gray-800 rounded-bl-none'
        }">
          ${text}
        </div>
      `;
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const dropdown = document.getElementById('goalSelect');
      let message = input.value.trim();

      if (!message && dropdown.value && dropdown.value !== "custom") {
        message = dropdown.value;
      }

      if (!message) return;

      appendMessage('user', message);
      input.value = '';
      dropdown.value = '';

      appendMessage('bot', 'Typing...');

      const prompt = `You are a Financial Goal Assistant chatbot. Help the user set and track goals, and suggest monthly saving strategies.
User's goal: "${message}"`;

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta2/models/chat-bison-001:generateMessage?key=${API_KEY}`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            prompt: {
              messages: [
                { author: "user", content: prompt }
              ]
            }
          })
        });

        const data = await response.json();
        const botMessage = data.candidates?.[0]?.content || "⚠️ Could not generate a response.";

        chatBox.removeChild(chatBox.lastChild); // remove 'Typing...'
        appendMessage('bot', botMessage);
      } catch (err) {
        chatBox.removeChild(chatBox.lastChild);
        appendMessage('bot', '⚠️ Oops! Something went wrong.');
        console.error(err);
      }
    }
  </script>

</body>
</html>
