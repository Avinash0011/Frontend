    <script>
        var num=0;
        var CGPA = 7;
        if(CGPA>9){
            document.write("Internship in Google<br>");
            num = 1;
        }else if(CGPA>=8 && CGPA<=9){
            document.write("Internship in TCS<br>");
            num = 2;
        }else if(CGPA>=7 && CGPA<=8){
            document.write("Internship in Infosys<br>");
            num = 3;
        }else{
            docuemnt.write("Inhouse Internship<br>");
        }

        document.write("Switch Statement<br>");
        //using switch statment
        switch(num){
            case 1:
                document.write("Internship in Google<br>");
            break;
            case 2:
                document.write("Internship in TCS<br>");
            break;
            case 3:
                document.write("Internship in Infosys<br>");
            break;
            default:
                document.write("Inhouse Internship<br>");
        }

        var num1 = 32;
        var num2 = 45;
        var operator = '+';
        var result = 0;

        //using switch statement for making calculator//
        switch(operator){
            case '/':
                result = num1/num2;
                document.write("After performing division<br>" +result);

            break;
            case '*':
                result = num*num2;
                document.write("After performing multiplication<br>"+result);
            break;
            case '+':
                result = num1+num2;
                document.write("After performing addition<br>"+result+"<br>");
                break;
            case '-':
                result = num1-num2;
                document.write("After performing subtraction<br>"+result);
                break;
            default:
                document.write("Invalid Operator !");
        }

        //using for loop//
        for(var i=0; i<10; i++){
            document.write("Loop "+i+"<br>");
        }
        //using while loop//
        var n = 10;
        while(n!=0){
            document.write(n+"<br>");
            n--;
        }
        //using do while//
        var n1 = 2;
        do{
            document.write(n);
            n1++;
        }while(n1<=12); 
    </script>
