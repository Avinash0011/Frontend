<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         .container{
            background-color: aquamarine;
            border: 8px solid brown;
            border-radius: 30px;
            padding: 20px;
            display: grid;
            /* grid-template-columns: 30% auto 50%;
            grid-template-rows: 200px 100px 50px; */
            grid-template: 200px 100px 50px / auto auto 50%;
            grid-row-gap: 10px;
            grid-column-gap: 10px ;
        }
        .item{
            border: 5px black solid;
            background-color: aliceblue;
            border-radius: 20px;
            padding: 10px;
            font-size: large;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            display: grid;
        }
        #I1{
            grid-column: 1/4;
            text-align: center;
            
        }
        #I2{
            grid-column: 1/4;
            text-align: center;
        }
        #I3{
            text-align: center;

        }
        #I4{
            text-align: center;
        }
        #I5{
            text-align: center;
        }
        #I6{
            text-align: center;
        }
        #I7{
            grid-column: 2/4;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="I1"><h1>Courses-Sem 4</h1></div>
        <div class="item" id="I2">INT-219
            <figure>
                <figcaption>Java</figcaption>
            </figure>
        </div>
        <div class="item" id="I3">Course-2</div>
        <div class="item" id="I4">Course-3</div>
        <div class="item" id="I5">Course-4</div>
        <div class="item" id="I6">Course-5</div>
        <div class="item" id="I7">Course-6</div>


    </div>    
</body>
</html>
