<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            background-color: aquamarine;
            border: 8px solid brown;
            border-radius: 30px;
            padding: 20px;
            display: grid;
            /* grid-template-columns: 30% auto 50%;
            grid-template-rows: 200px 100px 50px; */
            grid-template: 200px 100px 50px / auto auto 50%;
            grid-row-gap: 10px;
            grid-column-gap: 10px ;
        }
        .item{
            border: 5px black solid;
            background-color: aliceblue;
            border-radius: 20px;
            padding: 10px;
            font-size: large;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            display: grid;
        }
         #I3{
             grid-row-start: 2;
            grid-row-end: span 3;
            /*grid-row-end: 3;*/  /*stop starting of 3rd row*/
             grid-row: 2/span 3 ; 
        }
        #I7{
            grid-column: 3/span 2;
        } 
        #I9{
            grid-area: 4/3/span 1/span 2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">Item 1</div>
        <div class="item">Item 2</div>
        <div class="item" id="I3">Item 3</div>
        <div class="item">Item 4</div>
        <div class="item">Item 5</div>
        <div class="item">Item 6</div>
        <div class="item" id="I7">Item 7</div>
        <div class="item">Item 8</div>
        <div class="item" id="I9">Item 9</div>


    </div>    
</body>
</html>
